name: Test Dotfiles

on:
  push:
    branches: [main, feat/*]
  pull_request:
    branches: [main]

env:
  CHEZMOI_GIT_NAME: "CI Bot"
  CHEZMOI_GIT_EMAIL: "ci@example.com"
  CHEZMOI_GITHUB_USER: "quyetmv"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux test dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh

      - name: Install chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"

      - name: Add chezmoi to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Initialize chezmoi (no apply)
        run: chezmoi init --source="$PWD" --no-tty --apply=false

      - name: Run test suite
        run: ./scripts/test-chezmoi.sh

      - name: Dry-run apply
        run: |
          chezmoi apply \
            --dry-run \
            --force \
            --no-tty \
            --source="$PWD"
